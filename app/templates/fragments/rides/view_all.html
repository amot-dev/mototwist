{% if not ride_count or ride_count == '0' %}
    <button class="button button-very-small button-link" disabled>
        {{ ride_count_str }}
    </button>
{% else %}
<button class="button button-very-small button-link"
    onclick="document.querySelector('#modal-view-twist-rides').showModal()"
    hx-ext="form-json"
    hx-post="/twists/{{ twist_id }}/rides/templates/view-modal"
    hx-include="#twist-filter-form,#twist-{{ twist_id }}-ride-filter-form"
    hx-target="#modal-view-twist-rides"
    hx-swap="innerHTML">

    {{ ride_count_str }}
</button>
{% endif %}
